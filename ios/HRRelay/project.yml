name: HRRelay
options:
  bundleIdPrefix: com.precannes
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_NAME: HRRelay
    SWIFT_VERSION: 5.10
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  HRRelay:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Config/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
        UIApplicationSupportsMultipleScenes: false
        HRRelayAPIBaseURL: https://hackatriathlon-production.up.railway.app/api/telemetry
        HRRelayAPIKey: hacktri
        NSBluetoothAlwaysUsageDescription: HR Relay reads your heart rate belt and forwards event telemetry to your backend.
        NSMotionUsageDescription: HR Relay reads step count from your iPhone so motion telemetry can be settled alongside heart-rate markets.
        UIBackgroundModes:
          - bluetooth-central
          - processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.precannes.hrrelay
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: Config/HRRelay.entitlements
